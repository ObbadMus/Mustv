name: Update IPTV Playlist

on:
schedule:
- cron: "0 */12 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
update-playlist:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Merge playlists
    run: |
      curl -L https://iptv-org.github.io/iptv/index.country.m3u > arab-country.m3u
      curl -L https://iptv-org.github.io/iptv/regions/arab.m3u >> arab-country.m3u

  - name: Commit and push if changed
    run: |
      git config --global user.name "iptv-bot"
      git config --global user.email "bot@github.com"
      git add arab-country.m3u
      if git diff --cached --quiet; then
        echo "No changes to commit"
      else
        git commit -m "Update IPTV playlist"
        git push
      fi
```
